services:
  remotion-renderer:
    image: node:20-bookworm-slim
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      NODE_ENV: production
      REMOTION_COMPOSITION_ID: MainComposition
      VIDEO_OUTPUT_PATH: downloads/video-final.mp4
    command: sh -c "npm install && mkdir -p downloads && npm run build --if-present && npx remotion render remotion/src/index.ts MainComposition downloads/video-final.mp4 --codec=h264 --overwrite"
