name: Remotion Render

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Validate lint
        run: npm run lint
      - name: Render video
        run: npm run render
      - name: Render thumbnail
        run: npm run render:still
      - name: Export mp4
        run: npm run export
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sleep-timing-commercial
          path: |
            downloads/videos/sleep-timing-commercial.mp4
            downloads/thumbnails/thumbnail.png
            downloads/exports/manifest.json
            downloads/exports/sleep-timing-commercial.mp4
