name: Render Remotion Video

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Create downloads folder
        run: mkdir -p downloads

      - name: Build project
        run: npm run build --if-present

      - name: Render Remotion video
        run: npx remotion render remotion/src/index.ts MainComposition downloads/video-final.mp4 --codec=h264 --overwrite

      - name: Upload rendered video
        uses: actions/upload-artifact@v4
        with:
          name: video-remotion-final
          path: downloads/video-final.mp4
